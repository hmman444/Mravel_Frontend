name: Build & Deploy Frontend

# VITE_* values are baked into the static bundle at build time, so they are set
# here as repo Variables (Settings > Secrets and variables > Actions > Variables).
# They are public by nature (shipped to the browser) — do not put real secrets here.
on:
  push:
    branches: [main, dev_luan]
  workflow_dispatch:

concurrency:
  group: frontend-deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase owner
        id: own
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.own.outputs.owner }}/mravel-frontend:latest
            ghcr.io/${{ steps.own.outputs.owner }}/mravel-frontend:${{ github.sha }}
          build-args: |
            VITE_API_URL=/api
            VITE_REALTIME_WS_URL=${{ vars.VITE_REALTIME_WS_URL }}
            VITE_GOOGLE_CLIENT_ID=${{ vars.VITE_GOOGLE_CLIENT_ID }}
            VITE_FACEBOOK_APP_ID=${{ vars.VITE_FACEBOOK_APP_ID }}
            VITE_CLOUDINARY_CLOUD_NAME=${{ vars.VITE_CLOUDINARY_CLOUD_NAME }}
            VITE_CLOUDINARY_UPLOAD_PRESET=${{ vars.VITE_CLOUDINARY_UPLOAD_PRESET }}
            VITE_GOOGLE_MAPS_API_KEY=${{ vars.VITE_GOOGLE_MAPS_API_KEY }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # NOTE: no SSH deploy here — the VPS pulls new images itself via a cron
      # running scripts/deploy.sh. CI only builds & pushes to GHCR.
