server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # SPA fallback
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Proxy REST API -> gateway
  location /api/ {
    proxy_pass http://gateway:8080;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    # Same-origin in production: strip the browser's Origin header so the backend
    # services (whose CORS only whitelists localhost) don't reject same-origin
    # POST requests with 403 "Invalid CORS request". An empty value removes it.
    proxy_set_header Origin "";
  }

  # Proxy WebSocket (STOMP) -> gateway
  # Exact match /ws -> proxy_pass to /ws on gateway (preserve path without trailing slash)
  location = /ws {
    proxy_pass http://gateway:8080/ws;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
  }

  # Prefix /ws/ -> proxy to gateway as-is
  location /ws/ {
    proxy_pass http://gateway:8080;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
  }
}
